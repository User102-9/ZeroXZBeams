<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: 3px solid white;
            color: white;
            padding: 10px 25px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            display: none;
            text-transform: uppercase;
        }

        .discord-btn {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid white;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 0 0 15px #FFF, 0 0 30px #007BFF;
            margin-top: 10vh;
            text-transform: uppercase;
            z-index: 10;
        }

        #main-menu, #generators-page, #other-page {
            display: flex;
            gap: 30px;
            margin-top: 50px;
            z-index: 10;
            justify-content: center;
            width: 100%;
        }

        #generators-page, #other-page { display: none; }

        .big-box {
            border: 5px solid white;
            padding: 40px 50px;
            border-radius: 15px;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.6rem;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .big-box:hover {
            box-shadow: 0 0 30px #007BFF;
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        .night { position: absolute; width: 100%; height: 100%; transform: rotateZ(45deg); z-index: 1; }
        .shooting_star { position: absolute; height: 2px; background: linear-gradient(-45deg, #5f91ff, rgba(0,0,255,0)); animation: tail 3000ms infinite, shooting 3000ms infinite; }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }
    </style>
</head>
<body>

    <div class="night">
        <div class="shooting_star" style="top:10%; left:20%"></div>
        <div class="shooting_star" style="top:40%; left:60%"></div>
    </div>

    <header>
        <button class="back-btn" id="backBtn" onclick="goBack()">← BACK</button>
        <a href="https://discord.gg" class="discord-btn" target="_blank">OUR DISCORD</a>
    </header>

    <h1 class="logo" id="pageTitle">BeamZero</h1>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="big-box" onclick="openPage('Tutorials')">Tutorials</div>
        <div class="big-box" onclick="openPage('Generators')">Generators</div>
        <div class="big-box" onclick="openPage('Tools')">Tools</div>
    </div>

    <!-- GENERATORS PAGE (Cleaned up as requested) -->
    <div id="generators-page">
        <div class="big-box">Generate</div>
        <div class="big-box">Answers</div>
        <div class="big-box">Hide Link</div>
    </div>

    <div id="other-page">
        <h2 style="font-size: 2rem;">COMING SOON</h2>
    </div>

    <script>
        function openPage(name) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('pageTitle').innerText = name;

            if(name === 'Generators') {
                document.getElementById('generators-page').style.display = 'flex';
            } else {
                document.getElementById('other-page').style.display = 'flex';
            }
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('generators-page').style.display = 'none';
            document.getElementById('other-page').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('pageTitle').innerText = 'BeamZero';
        }
    </script>
</body>
</html>
