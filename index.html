<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroBeaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Top Right Discord Button */
        .discord-btn-top {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.8rem;
            z-index: 1000;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff0000, #800000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-section {
            margin-bottom: 50px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .service-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .service-page {
            display: none;
        }

        .service-page.active {
            display: block;
        }

        .back-btn {
            background: #333;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0d0d0d;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .generate-btn {
            width: 100%;
            background: #ff0000;
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
        }

        .result-box {
            background: #1a1a1a;
            border: 1px solid #ff0000;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-text {
            word-break: break-all;
            padding: 12px;
            background: #0d0d0d;
            border-radius: 6px;
            font-family: monospace;
        }

        .star {
            position: absolute;
            color: #ff0000;
            pointer-events: none;
            z-index: 1;
            font-size: 12px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            from { transform: translateY(-50px); opacity: 1; }
            to { transform: translateY(110vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <a href="https://discord.gg" class="discord-btn-top" target="_blank">OUR DISCORD</a>

    <div class="container" style="position: relative; z-index: 2;">
        <div id="homePage">
            <div class="header">
                <h1>ZeroBeaming</h1>
            </div>
            <div class="nav-section">
                <div class="services-grid">
                    <div class="service-card" onclick="openService('is.gd')">
                        <h3>Hyperlink</h3>
                        <p>Fast shortening service</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="servicePage" class="service-page">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h2 id="serviceTitle" style="text-align:center; margin-bottom:20px;">is.gd</h2>
            
            <div class="form-container">
                <select class="form-select" id="optionSelect">
                    <option value="private-server">Private Server</option>
                    <option value="profile">Profile</option>
                </select>
                <input type="url" class="form-input" id="urlInput" placeholder="https://roblox.com">
                <button class="generate-btn" onclick="generateLink()">Generate Link</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-text" id="resultText"></div>
                <button class="generate-btn" style="margin-top:10px" onclick="copyResult()">Copy</button>
            </div>
        </div>
    </div>

    <script>
        function openService(service) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('servicePage').classList.add('active');
            document.getElementById('serviceTitle').textContent = service;
        }

        function goBack() {
            document.getElementById('servicePage').classList.remove('active');
            document.getElementById('homePage').style.display = 'block';
        }

        async function generateLink() {
            const urlInput = document.getElementById('urlInput');
            const option = document.getElementById('optionSelect').value;
            const originalUrl = urlInput.value.trim();
            if (!originalUrl) { alert('Enter a URL!'); return; }

            const resultText = document.getElementById('resultText');
            resultText.innerHTML = '<span>Processing...</span>';
            document.getElementById('resultBox').classList.add('show');

            try {
                const cbName = 'beam_cb_' + Date.now();
                window[cbName] = function(data) {
                    if (data.shorturl) {
                        let displayUrl = originalUrl;
                        if(option === 'profile') displayUrl = "https://roblox.com";
                        if(option === 'private-server') displayUrl = "https://roblox.com";
                        resultText.textContent = `[${displayUrl}](${data.shorturl})`;
                    } else {
                        resultText.textContent = "Error: " + (data.errormessage || "Invalid URL");
                    }
                    delete window[cbName];
                    document.getElementById('temp_script').remove();
                };

                const script = document.createElement('script');
                script.id = 'temp_script';
                script.src = `https://is.gd{cbName}&url=${encodeURIComponent(originalUrl)}`;
                document.body.appendChild(script);
            } catch (e) { resultText.textContent = "Connection Error."; }
        }

        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('resultText').innerText);
            alert("Copied!");
        }

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }
        setInterval(createStar, 400);
    </script>
</body>
</html>
