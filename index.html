<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAM ZERO</title>
    <style>
        /* BeamZero Theme Core */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Arial Black', sans-serif;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; width: 100%; z-index: 2; }

        /* Header Styles */
        .header { text-align: center; padding: 60px 0; margin-bottom: 20px; }
        .header h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff0000, #990000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .subtitle { color: #888; font-size: 1rem; margin-top: 10px; letter-spacing: 2px; }

        /* Service Cards */
        .services-grid { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .service-card {
            background: #111;
            border: 2px solid #ff0000;
            border-radius: 50px;
            padding: 20px 50px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .service-card:hover { background: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
        .service-card h3 { font-size: 1.2rem; text-transform: uppercase; }

        /* Page Transitions */
        .service-page { display: none; animation: fadeIn 0.3s ease; }
        .service-page.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tabs & Forms */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab { 
            background: transparent; border: 1px solid #444; color: #888; 
            padding: 10px 20px; cursor: pointer; border-radius: 5px; 
        }
        .tab.active { border-color: #ff0000; color: white; background: #200; }

        .form-container {
            background: #111; border: 1px solid #ff0000; padding: 30px;
            border-radius: 15px; width: 100%; max-width: 500px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 10px; font-size: 0.8rem; color: #ff0000; }
        .form-input, .form-select {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333;
            color: white; border-radius: 8px; outline: none;
        }
        .form-input:focus { border-color: #ff0000; }

        .generate-btn {
            width: 100%; background: #ff0000; color: white; border: none;
            padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .generate-btn:hover { box-shadow: 0 0 20px #ff0000; transform: scale(1.02); }

        /* Results */
        .result-box {
            margin-top: 30px; padding: 20px; background: #000; border: 1px dashed #ff0000;
            border-radius: 10px; display: none; width: 100%; max-width: 500px;
        }
        .result-box.show { display: block; }
        .result-text { font-family: monospace; word-break: break-all; margin-bottom: 15px; font-size: 0.9rem; }

        .back-btn { margin-bottom: 20px; background: transparent; border: 1px solid #fff; color: white; padding: 8px 15px; cursor: pointer; }

        /* Discord Section */
        .discord-section { position: absolute; top: 20px; right: 20px; }
        .discord-btn { 
            background: white; color: black; padding: 10px 20px; border-radius: 8px; 
            text-decoration: none; font-weight: bold; font-size: 0.8rem; 
        }

        /* Stars */
        .star { position: absolute; color: #ff0000; pointer-events: none; z-index: 1; font-size: 10px; animation: fall linear forwards; }
        @keyframes fall { from { transform: translateY(-50px); } to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div class="discord-section">
        <a href="https://discord.gg" class="discord-btn" target="_blank">OUR DISCORD</a>
    </div>

    <div class="container">
        <!-- Home Page -->
        <div id="homePage">
            <div class="header">
                <h1>BEAM ZERO</h1>
                <p class="subtitle">PROFESSIONAL TOOLING</p>
            </div>

            <div class="services-grid">
                <div class="service-card" onclick="openService('is.gd')">
                    <h3>Hyperlink</h3>
                </div>
                <div class="service-card" style="opacity: 0.5; cursor: default;">
                    <h3>Generators</h3>
                </div>
            </div>
        </div>

        <!-- Service Page -->
        <div id="servicePage" class="service-page">
            <button class="back-btn" onclick="goBack()">← BACK</button>
            <h2 id="serviceTitle" style="margin-bottom: 20px; color: #ff0000;">IS.GD</h2>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('shorten')">SHORTEN</button>
                <button class="tab" onclick="switchTab('unshorten')">UNSHORTEN</button>
            </div>

            <div id="shortenTab" class="form-container">
                <div class="form-group">
                    <label class="form-label">LINK TYPE</label>
                    <select class="form-select" id="optionSelect">
                        <option value="profile">Profile</option>
                        <option value="private-server">Private Server</option>
                        <option value="any">Any Link</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">TARGET URL</label>
                    <input type="url" class="form-input" id="urlInput" placeholder="https://roblox.com...">
                </div>
                <button class="generate-btn" onclick="generateLink()">GENERATE</button>
            </div>

            <div id="unshortenTab" class="form-container" style="display: none;">
                <div class="form-group">
                    <label class="form-label">SHORT URL</label>
                    <input type="url" class="form-input" id="shortUrlInput" placeholder="https://is.gd/...">
                </div>
                <button class="generate-btn" onclick="unshortenLink()">REVEAL</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-text" id="resultText"></div>
                <button class="generate-btn" style="padding: 10px;" onclick="copyResult()">COPY</button>
            </div>
        </div>
    </div>

    <script>
        function openService(service) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('servicePage').classList.add('active');
        }

        function goBack() {
            document.getElementById('servicePage').classList.remove('active');
            document.getElementById('homePage').style.display = 'block';
        }

        function switchTab(tab) {
            document.getElementById('shortenTab').style.display = tab === 'shorten' ? 'block' : 'none';
            document.getElementById('unshortenTab').style.display = tab === 'unshorten' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'shorten' ? i === 0 : i === 1)));
        }

        async function generateLink() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resBox = document.getElementById('resultBox');
            const resText = document.getElementById('resultText');
            const type = document.getElementById('optionSelect').value;

            if(!urlInput.startsWith('http')) return alert("Invalid URL");

            resBox.style.display = 'block';
            resText.innerText = "Processing...";

            // Use the JSONP trick to bypass all CORS/Red Cross errors
            const cbName = 'beam_' + Date.now();
            window[cbName] = function(data) {
                if(data.shorturl) {
                    // Logic to format display link vs hidden link
                    let display = urlInput;
                    if(type === 'profile') display = "https://roblox.com";
                    if(type === 'private-server') display = "https://roblox.com";
                    
                    resText.innerText = `[${display}](${data.shorturl})`;
                } else {
                    resText.innerText = "Error: " + (data.errormessage || "Invalid Link");
                }
                delete window[cbName];
                document.getElementById('temp_script').remove();
            };

            const script = document.createElement('script');
            script.id = 'temp_script';
            script.src = `https://is.gd{cbName}&url=${encodeURIComponent(urlInput)}`;
            document.body.appendChild(script);
        }

        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('resultText').innerText);
            alert("Copied!");
        }

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }
        setInterval(createStar, 400);
    </script>
</body>
</html>
