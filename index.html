<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0a0a;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        color: #ffffff;
        line-height: 1.6;
        overflow-x: hidden;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2; }

    /* New Top Right Discord Button */
    .discord-btn-top {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #ffffff;
        color: #000000;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 900;
        font-size: 0.8rem;
        z-index: 1000;
        text-transform: uppercase;
        transition: 0.3s;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }
    .discord-btn-top:hover {
        background: #ff0000;
        color: #ffffff;
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    }

    .header h1 {
        font-size: 3.5rem;
        font-weight: 900;
        margin-bottom: 15px;
        background: linear-gradient(45deg, #ff0000, #800000);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 2px 10px rgba(255, 0, 0, 0.3);
        text-align: center;
    }

    .header { text-align: center; padding: 60px 0; border-bottom: 1px solid #333; margin-bottom: 40px; }
    .header .subtitle { font-size: 1.2rem; color: #888888; font-weight: 300; }

    .nav-section h2 { font-size: 1.8rem; color: #ffffff; margin-bottom: 20px; text-align: center; font-weight: 600; }
    
    /* Menu Grid */
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .service-card { background: #1a1a1a; border: 2px solid #333; border-radius: 12px; padding: 25px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
    .service-card:hover { background: #222; border-color: #ff0000; transform: translateY(-3px); box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
    .service-card h3 { font-size: 1.3rem; color: #ffffff; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
    .service-card p { color: #888; font-size: 0.85rem; }

    /* Service Pages */
    .service-page { display: none; animation: fadeIn 0.3s ease; }
    .service-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Falling Stars */
    .star { position: absolute; color: #ff0000; pointer-events: none; z-index: 1; font-size: 12px; animation: fall linear forwards; }
    @keyframes fall { from { transform: translateY(-50px); opacity: 1; } to { transform: translateY(110vh); opacity: 0; } }

    /* Shared Elements */
    .back-btn { background: #333; border: none; color: #ffffff; cursor: pointer; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; transition: 0.3s; }
    .back-btn:hover { background: #ff0000; }
    .tabs { display: flex; margin-bottom: 30px; border-radius: 8px; overflow: hidden; background: #1a1a1a; border: 1px solid #333; }
    .tab { flex: 1; padding: 15px 20px; background: transparent; border: none; color: #aaa; cursor: pointer; font-weight: bold; }
    .tab.active { background: #ff0000; color: #ffffff; }
    .form-container { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; }
    .generate-btn { width: 100%; background: #ff0000; border: none; border-radius: 8px; padding: 15px; color: #ffffff; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .result-box { background: #1a1a1a; border: 1px solid #ff0000; border-radius: 12px; padding: 25px; margin-top: 20px; display: none; text-align: center; }
    .result-box.show { display: block; }
    .result-text { word-break: break-all; margin-bottom: 15px; padding: 12px; background: #0d0d0d; border-radius: 6px; font-family: monospace; }
</style>
<body>
    <!-- Discord Button Top Right -->
    <a href="https://discord.gg/TCGuHsda" class="discord-btn-top" target="_blank">Join Discord</a>

    <div class="container">
        <!-- Home Page -->
        <div id="homePage">
            <div class="header">
                <h1>ZeroBeams</h1>
                <p class="subtitle">Professional Link Management & Tooling</p>
            </div>

            <div class="nav-section">
                <div class="services-grid">
                    <!-- Main Dashboard Card -->
                    <div class="service-card" onclick="alert('Dashboard coming soon!')">
                        <h3>Main Dashboard</h3>
                        <p>Overview of your current tools</p>
                    </div>

                    <!-- Hyperlink Card -->
                    <div class="service-card" onclick="openService('Hyperlink')">
                        <h3>Hyperlink</h3>
                        <p>Advanced Roblox link shortening</p>
                    </div>

                    <!-- Questions Card -->
                    <div class="service-card" onclick="alert('Questions feed coming soon!')">
                        <h3>Questions</h3>
                        <p>Community support and public feed</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Service Page (Hyperlink) -->
        <div id="servicePage" class="service-page">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h2 id="serviceTitle" style="text-align:center; margin-bottom:20px; text-transform:uppercase;">Hyperlink</h2>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('shorten')">Shorten URL</button>
                <button class="tab" onclick="switchTab('unshorten')">Unshorten URL</button>
            </div>

            <div id="shortenTab" class="form-container">
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:5px;">Select Type</label>
                    <select id="optionSelect" style="width:100%; padding:10px; background:#000; color:white; border:1px solid #333;">
                        <option value="private-server">Private Server</option>
                        <option value="profile">Profile</option>
                        <option value="any">Any Link</option>
                    </select>
                </div>
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:5px;">Target URL</label>
                    <input type="url" id="urlInput" placeholder="https://roblox.com..." style="width:100%; padding:10px; background:#000; color:white; border:1px solid #333;">
                </div>
                <button class="generate-btn" onclick="generateLink()">Generate Link</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-text" id="resultText"></div>
                <button class="generate-btn" onclick="copyResult()">Copy Result</button>
            </div>
        </div>
    </div>
<script>
    function openService(service) {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('servicePage').classList.add('active');
        document.getElementById('resultBox').classList.remove('show');
    }

    function goBack() {
        document.getElementById('servicePage').classList.remove('active');
        document.getElementById('homePage').style.display = 'block';
    }

    // YOUR WORKING GENERATE LOGIC
    async function generateLink() {
        const urlInput = document.getElementById('urlInput');
        const option = document.getElementById('optionSelect').value;
        const originalUrl = urlInput.value.trim();
        if (!originalUrl) { alert('Enter a URL!'); return; }

        const resultText = document.getElementById('resultText');
        resultText.innerHTML = '<span style="color:#888">Processing...</span>';
        document.getElementById('resultBox').classList.add('show');

        try {
            // Using the JSONP trick that you said works
            const cbName = 'beam_cb_' + Date.now();
            window[cbName] = function(data) {
                if (data.shorturl) {
                    let displayUrl = originalUrl;
                    if(option === 'profile') displayUrl = "https://roblox.com";
                    if(option === 'private-server') displayUrl = "https://roblox.com";
                    
                    resultText.textContent = `[${displayUrl}](${data.shorturl})`;
                } else {
                    resultText.textContent = "Error: " + (data.errormessage || "Invalid URL");
                }
                delete window[cbName];
                document.getElementById('temp_script').remove();
            };

            const script = document.createElement('script');
            script.id = 'temp_script';
            script.src = `https://is.gd{cbName}&url=${encodeURIComponent(originalUrl)}`;
            document.body.appendChild(script);
        } catch (e) { resultText.textContent = "Connection Error."; }
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('resultText').innerText);
        alert("Copied!");
    }

    function createStar() {
        const star = document.createElement('div');
        star.className = 'star';
        star.innerHTML = '★';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 5000);
    }
    setInterval(createStar, 400);
</script>
</body>
</html>
