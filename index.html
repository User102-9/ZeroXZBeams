<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Header for the Discord Button */
        header {
            width: 100%;
            display: flex;
            justify-content: flex-end; 
            padding: 15px 25px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            z-index: 100;
        }

        /* BeamZero: Smaller and High Up */
        .logo {
            font-size: 3.5rem; /* Scaled down significantly */
            font-weight: 700;
            color: #FFFFFF;
            text-shadow: 0 0 10px #FFF, 0 0 20px #007BFF;
            letter-spacing: 4px;
            margin-top: 10vh; /* Keeps it high up */
            text-transform: uppercase;
            z-index: 10;
        }

        /* Discord Button: Small and Blue */
        .discord-btn {
            background-color: #007BFF;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s ease;
        }

        .discord-btn:hover {
            background-color: #0056b3;
            box-shadow: 0 0 12px #007BFF;
        }

        /* Falling Stars Effect */
        .night {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotateZ(45deg);
            z-index: 1;
        }

        .shooting_star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, #5f91ff, rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #699bff);
            animation: tail 3000ms ease-in-out infinite, shooting 3000ms ease-in-out infinite;
        }

        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }

        .shooting_star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
        .shooting_star:nth-child(2) { top: 25%; left: 45%; animation-delay: 1s; }
        .shooting_star:nth-child(3) { top: 15%; left: 75%; animation-delay: 2s; }
        .shooting_star:nth-child(4) { top: 50%; left: 25%; animation-delay: 0.5s; }
    </style>
</head>
<body>

    <div class="night">
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
    </div>

    <header>
        <a href="https://discord.gg" class="discord-btn" target="_blank">OUR DISCORD</a>
    </header>

    <h1 class="logo">BeamZero</h1>

</body>
</html>
