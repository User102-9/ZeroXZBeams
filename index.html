<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* Header Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: relative;
            z-index: 100;
        }

        /* BeamZero: Smaller, at the top, white and glowing */
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #FFFFFF;
            text-shadow: 0 0 10px #FFF, 0 0 20px #007BFF;
            letter-spacing: 2px;
            margin: 0;
        }

        /* Discord Button: Smaller and Blue */
        .discord-btn {
            background-color: #007BFF; /* Bright Blue */
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #FFFFFF;
            transition: 0.3s ease;
        }

        .discord-btn:hover {
            background-color: #0056b3;
            box-shadow: 0 0 15px #007BFF;
            transform: scale(1.05);
        }

        /* Falling Stars background logic */
        .night {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotateZ(45deg);
            z-index: 1;
        }

        .shooting_star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, #5f91ff, rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #699bff);
            animation: tail 3000ms ease-in-out infinite, shooting 3000ms ease-in-out infinite;
        }

        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }

        .shooting_star:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .shooting_star:nth-child(2) { top: 40%; left: 30%; animation-delay: 1s; }
        .shooting_star:nth-child(3) { top: 20%; left: 70%; animation-delay: 2s; }
        .shooting_star:nth-child(4) { top: 60%; left: 50%; animation-delay: 1.5s; }
    </style>
</head>
<body>

    <div class="night">
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
    </div>

    <header>
        <p class="logo">BeamZero</p>
        <a href="https://discord.gg" class="discord-btn" target="_blank">OUR DISCORD</a>
    </header>

</body>
</html>
