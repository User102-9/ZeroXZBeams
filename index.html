<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroBeams</title>
    <style>
        /* ZeroBeams Core Aesthetic */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 2; /* Keep above stars */
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff0000, #800000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .header .subtitle {
            font-size: 1rem;
            color: #ff0000;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .service-card {
            background: #111;
            border: 2px solid #ff0000;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .service-card:hover {
            background: #200;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            transform: translateY(-5px);
        }

        .service-card h3 {
            font-size: 1.5rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Falling Red Stars Background */
        .star {
            position: absolute;
            color: #ff0000;
            pointer-events: none;
            z-index: 1;
            font-size: 12px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            from { transform: translateY(-50px); opacity: 1; }
            to { transform: translateY(110vh); opacity: 0; }
        }

        /* Service Page Layout */
        .service-page { display: none; animation: fadeIn 0.4s ease; }
        .service-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .back-btn {
            background: transparent;
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover { background: #ff0000; color: #000; }
        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            background: #111;
            border: 1px solid #ff0000;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tab.active {
            background: #ff0000;
            color: #000;
        }

        /* Forms */
        .form-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 25px; }
        .form-label { display: block; margin-bottom: 10px; color: #ff0000; font-size: 0.9rem; font-weight: bold; }
        
        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ff0000;
            border-radius: 8px;
            background: #000;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }

        .generate-btn {
            width: 100%;
            background: #ff0000;
            border: none;
            border-radius: 50px;
            padding: 15px;
            color: #ffffff;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .generate-btn:hover {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            transform: scale(1.01);
        }

        /* Results Box */
        .result-box {
            background: #000;
            border: 2px dashed #ff0000;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .result-box.show { display: block; }
        .result-text {
            word-break: break-all;
            margin-bottom: 15px;
            padding: 15px;
            background: #111;
            color: #ff0000;
            font-family: monospace;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Home Page -->
        <div id="homePage">
            <div class="header">
                <h1>ZeroBeams</h1>
                <p class="subtitle">Professional Link Management</p>
            </div>
            <div class="services-grid">
                <div class="service-card" onclick="openService('is.gd')">
                    <h3>Hyperlink</h3>
                </div>
            </div>
        </div>

        <!-- Service Page -->
        <div id="servicePage" class="service-page">
            <button class="back-btn" onclick="goBack()">← BACK</button>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('shorten')">Shorten</button>
                <button class="tab" onclick="switchTab('unshorten')">Unshorten</button>
            </div>

            <div id="shortenTab" class="form-container">
                <div class="form-group">
                    <label class="form-label">LINK TYPE</label>
                    <select class="form-select" id="optionSelect">
                        <option value="private-server">Private Server</option>
                        <option value="profile">Profile</option>
                        <option value="group">Group</option>
                        <option value="any">Any Link</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">YOUR LINK</label>
                    <input type="url" class="form-input" id="urlInput" placeholder="https://roblox.com...">
                </div>
                <button class="generate-btn" onclick="generateLink()">Shorten Link</button>
            </div>

            <div id="unshortenTab" class="form-container" style="display: none;">
                <div class="form-group">
                    <label class="form-label">SHORT LINK</label>
                    <input type="url" class="form-input" id="shortUrlInput" placeholder="https://is.gd...">
                </div>
                <button class="generate-btn" onclick="unshortenLink()">Reveal Original</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-text" id="resultText"></div>
                <button class="generate-btn" onclick="copyResult()">Copy to Clipboard</button>
            </div>
        </div>
    </div>
    <script>
        // Navigation Logic
        function openService(service) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('servicePage').classList.add('active');
            document.getElementById('resultBox').classList.remove('show');
        }

        function goBack() {
            document.getElementById('servicePage').classList.remove('active');
            document.getElementById('homePage').style.display = 'block';
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'shorten') {
                tabs[0].classList.add('active');
                document.getElementById('shortenTab').style.display = 'block';
                document.getElementById('unshortenTab').style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('shortenTab').style.display = 'none';
                document.getElementById('unshortenTab').style.display = 'block';
            }
        }

        // --- YOUR HYPERLINK LOGIC (TOUCHED NOTHING) ---
        async function generateLink() {
            const urlInput = document.getElementById('urlInput');
            const option = document.getElementById('optionSelect').value;
            const originalUrl = urlInput.value.trim();

            if (!originalUrl) {
                alert('Please enter a URL!');
                return;
            }

            const resultText = document.getElementById('resultText');
            resultText.innerHTML = '<span style="color:#888">Generating...</span>';
            document.getElementById('resultBox').classList.add('show');

            try {
                // Using JSONP to bypass CORS errors on Vercel
                const cbName = 'beam_cb_' + Date.now();
                window[cbName] = function(data) {
                    if (data.shorturl) {
                        const shortenedUrl = data.shorturl;
                        let displayUrl;
                        const userId = originalUrl.match(/users\/(\d+)/)?.[1] || 'ID';
                        const groupId = originalUrl.match(/(communities|groups)\/(\d+)/)?.[2] || 'ID';
                        const serverCode = originalUrl.match(/code=([a-f0-9]+)/i)?.[1] || 'abc';

                        switch (option) {
                            case 'profile':
                                displayUrl = `https__:__//://roblox.com{userId}/profile`;
                                break;
                            case 'group':
                                displayUrl = `https__:__//://roblox.com{groupId}`;
                                break;
                            case 'private-server':
                                displayUrl = `https_:_//://roblox.com{serverCode}&type=Server`;
                                break;
                            default:
                                displayUrl = originalUrl;
                        }
                        resultText.textContent = `[${displayUrl}](${shortenedUrl})`;
                    } else {
                        resultText.textContent = "Error: " + (data.errormessage || "Invalid Link");
                    }
                    document.getElementById('temp_script').remove();
                    delete window[cbName];
                };

                const script = document.createElement('script');
                script.id = 'temp_script';
                script.src = `https://is.gd{cbName}&url=${encodeURIComponent(originalUrl)}`;
                document.body.appendChild(script);

            } catch (error) {
                resultText.textContent = "Error: Failed to connect.";
            }
        }

        function copyResult() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }

        // --- FALLING STARS ANIMATION ---
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }
        setInterval(createStar, 400);
    </script>
</body>
</html>
