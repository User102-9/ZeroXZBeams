<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body { margin: 0; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; display: flex; justify-content: space-between; padding: 20px; }
        .back-btn { background: none; border: 3px solid white; color: white; padding: 10px 25px; font-weight: 900; cursor: pointer; display: none; }
        .discord-btn { background-color: #007BFF; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; border: 2px solid white; }
        .logo { font-size: 3rem; font-weight: 900; text-shadow: 0 0 15px #007BFF; margin-top: 5vh; }
        #main-menu, .page-content, #tools-menu { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 30px; }
        .page-content, #tools-menu { display: none; }
        .big-box { border: 3px solid white; padding: 20px; border-radius: 10px; cursor: pointer; background: rgba(255,255,255,0.1); text-align: center; }
        .tool-container { background: rgba(0,0,0,0.5); border: 2px solid white; padding: 30px; border-radius: 15px; width: 80%; max-width: 600px; }
        .gen-input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .gen-btn { background: #007BFF; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
        .result-box { background: #000; padding: 15px; margin-top: 15px; color: #0f0; word-break: break-all; display: none; }
    </style>
</head>
<body>
    <header>
        <button class="back-btn" id="backBtn" onclick="goBack()">← BACK</button>
        <a href="https://discord.gg" class="discord-btn" target="_blank">DISCORD</a>
    </header>

    <h1 class="logo">BeamZero</h1>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="big-box" onclick="showTools()">Tools</div>
    </div>

    <!-- TOOLS MENU -->
    <div id="tools-menu">
        <div class="big-box" onclick="showHyperlink()">Hyperlink</div>
    </div>

    <!-- HYPERLINK CONTENT -->
    <div id="hyperlink-content" class="page-content">
        <div class="tool-container">
            <h3>Hyperlink Generator</h3>
            <select id="method" class="gen-input">
                <option value="profile">Profile</option>
                <option value="server">Private Server</option>
                <option value="group">Group Link</option>
            </select>
            <input type="text" id="shortLink" class="gen-input" placeholder="Paste CleanURI link">
            <button class="gen-btn" onclick="generateLink()">Generate</button>
            <div id="result" class="result-box"></div>
        </div>
    </div>

    <script>
        function showTools() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('tools-menu').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'block';
        }
        function showHyperlink() {
            document.getElementById('tools-menu').style.display = 'none';
            document.getElementById('hyperlink-content').style.display = 'flex';
        }
        function generateLink() {
            const link = document.getElementById('shortLink').value.trim();
            const resultBox = document.getElementById('result');
            if(!link) { alert("Paste link!"); return; }
            resultBox.innerText = `[https://roblox.com](${link})`;
            resultBox.style.display = 'block';
        }
        function goBack() {
            location.reload();
        }
    </script>
</body>
</html>
