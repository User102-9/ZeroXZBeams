<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BeamZero - Hyperlink Generator</title>
    <style>
        body { margin: 0; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .discord-btn { background-color: #007BFF; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; border: 2px solid white; font-weight: bold; }
        .logo { font-size: 3rem; font-weight: 900; text-shadow: 0 0 15px #007BFF; margin-top: 5vh; text-transform: uppercase; }
        .tool-container { background: rgba(0, 0, 0, 0.6); border: 3px solid white; border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; margin-top: 30px; z-index: 10; }
        .gen-input { width: 100%; padding: 12px; background: #000; border: 2px solid white; color: white; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        .gen-btn { background: #007BFF; color: white; border: 2px solid white; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 8px; width: 100%; text-transform: uppercase; }
        .gen-btn:disabled { background: #444; cursor: not-allowed; }
        .result-box { background: #000; padding: 15px; border-radius: 10px; border-left: 5px solid #00ff00; margin-top: 20px; font-family: monospace; word-break: break-all; display: none; cursor: pointer; text-align: center; }
        .status { margin-top: 10px; font-size: 0.9rem; color: #007BFF; display: none; }
        
        /* Stars effect */
        .night { position: fixed; width: 100%; height: 100%; transform: rotateZ(45deg); z-index: 1; pointer-events: none; }
        .shooting_star { position: absolute; height: 2px; background: linear-gradient(-45deg, #5f91ff, rgba(0,0,255,0)); animation: tail 3000ms infinite, shooting 3000ms infinite; }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }
    </style>
</head>
<body>

    <div class="night">
        <div class="shooting_star" style="top:10%; left:20%"></div>
        <div class="shooting_star" style="top:40%; left:60%"></div>
    </div>

    <header>
        <button onclick="location.reload()" style="background:none; border:2px solid white; color:white; padding:10px; cursor:pointer; border-radius:5px; font-weight:bold;">← BACK</button>
        <a href="https://discord.gg" class="discord-btn" target="_blank">OUR DISCORD</a>
    </header>

    <h1 class="logo">BeamZero</h1>

    <div class="tool-container">
        <h2 style="border-bottom: 2px solid #007BFF; padding-bottom:10px;">Hyperlink Generator</h2>
        
        <p>1. Select Type:</p>
        <select id="method" class="gen-input">
            <option value="profile">FOR PROFILE</option>
            <option value="server">FOR PRIVATE SERVER</option>
            <option value="group">FOR GROUP LINK</option>
        </select>

        <p>2. Paste your long Roblox link:</p>
        <input type="text" id="longUrl" class="gen-input" placeholder="https://roblox.com...">

        <button class="gen-btn" id="genBtn" onclick="generateShortLink()">Shorten & Generate</button>
        <div id="status" class="status">Connecting to CleanURI API...</div>

        <div id="result" class="result-box" title="Click to Copy"></div>
    </div>

    <script>
        async function generateShortLink() {
            const longUrl = document.getElementById('longUrl').value.trim();
            const resultBox = document.getElementById('result');
            const status = document.getElementById('status');
            const btn = document.getElementById('genBtn');

            if (!longUrl) { alert("Please paste a link first!"); return; }

            btn.disabled = true;
            status.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                // Using a proxy to handle the POST /api/v1/shorten request to CleanURI
                const response = await fetch('https://corsproxy.io?' + encodeURIComponent('https://cleanuri.com'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'url': longUrl })
                });

                const data = await response.json();
                
                if (data.result_url) {
                    // Apply your rule: [https://roblox.com](ShortLink)
                    const finalCode = `[https://roblox.com](${data.result_url})`;
                    resultBox.innerText = finalCode;
                    resultBox.style.display = 'block';
                } else if (data.error) {
                    alert("API Error: " + data.error);
                }
            } catch (err) {
                alert("Failed to connect to CleanURI. Check your internet or link.");
            } finally {
                btn.disabled = false;
                status.style.display = 'none';
            }
        }

        // Copy on click
        document.getElementById('result').onclick = function() {
            navigator.clipboard.writeText(this.innerText);
            const originalText = this.innerText;
            this.innerText = "COPIED!";
            setTimeout(() => { this.innerText = originalText; }, 1000);
        };
    </script>
</body>
</html>
