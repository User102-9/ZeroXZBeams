<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroBypass | Console Utility</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-black text-white selection:bg-white selection:text-black antialiased min-h-screen flex flex-col items-center justify-start p-6 md:p-12 font-sans">

    <!-- Top Centered Header Branding -->
    <header class="w-full text-center max-w-xl mt-8 mb-4">
        <p class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 font-semibold mb-1">
            Best Utility 2026
        </p>
        <h1 class="text-4xl font-extrabold tracking-tight text-white uppercase select-none">
            zerobypass
        </h1>
        <p class="text-xs text-zinc-400 font-mono tracking-widest mt-1">
            easy fast
        </p>
    </header>

    <!-- Main Container Matching Image Structure -->
    <main class="w-full max-w-xl space-y-4">
        
        <!-- Selection Dropdown Menu -->
        <div class="relative w-48 mx-auto">
            <select class="w-full bg-zinc-900 border border-zinc-800 text-zinc-300 text-xs px-3 py-2 rounded-md appearance-none focus:outline-none focus:border-zinc-600 transition-colors cursor-pointer text-center">
                <option>Format Utility Text</option>
                <option>Minify Script Data</option>
                <option>Sanitize Text Strings</option>
            </select>
        </div>

        <!-- Central Glassmorphism Control Panel -->
        <div class="w-full bg-zinc-900/40 border border-zinc-800/60 rounded-xl p-5 space-y-3 shadow-2xl backdrop-blur-md">
            
            <!-- Context Line Input Box -->
            <div class="w-full">
                <input 
                    type="text" 
                    placeholder="Enter process identifier or header tag..." 
                    class="w-full bg-zinc-950/60 border border-zinc-800/40 rounded-lg px-4 py-3 text-sm text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-zinc-700 transition-colors"
                />
            </div>

            <!-- Large Text Content Box -->
            <div class="w-full">
                <textarea 
                    rows="6" 
                    placeholder="Paste unformatted console logs or code snippets here for sanitation..." 
                    class="w-full bg-zinc-950/60 border border-zinc-800/40 rounded-lg px-4 py-3 text-sm text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-zinc-700 transition-colors resize-none font-mono"
                ></textarea>
            </div>

            <!-- Action Trigger Button Layout -->
            <div class="flex justify-end pt-1">
                <button class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-semibold px-5 py-2.5 rounded-lg border border-zinc-700/50 hover:border-zinc-600 active:scale-95 transition-all cursor-pointer shadow-md">
                    Process
                </button>
            </div>

        </div>

    </main>

    <!-- Footer System Status Line -->
    <footer class="mt-auto pt-12 text-[10px] font-mono tracking-widest text-zinc-600 uppercase">
        Platform Engine Operational
    </footer>

</body>
</html>
