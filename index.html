<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroBeaming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2; }

        /* White Discord Button Top Right */
        .discord-btn-top {
            position: absolute; top: 20px; right: 20px;
            background: #ffffff; color: #000000;
            text-decoration: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 900; font-size: 0.8rem;
            z-index: 1000; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        .discord-btn-top:hover { background: #ff0000; color: #ffffff; }

        .header { text-align: center; padding: 60px 0; border-bottom: 1px solid #333; margin-bottom: 40px; }
        .header h1 {
            font-size: 3.5rem; font-weight: 900; margin-bottom: 15px;
            background: linear-gradient(45deg, #ff0000, #800000);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; text-shadow: 0 2px 10px rgba(255, 0, 0, 0.3);
        }

        /* Menu Grid */
        .services-grid { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .service-card { background: #1a1a1a; border: 2px solid #333; border-radius: 12px; padding: 30px 60px; cursor: pointer; transition: 0.3s; text-align: center; }
        .service-card:hover { border-color: #ff0000; transform: translateY(-3px); box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .service-card h3 { font-size: 1.5rem; text-transform: uppercase; color: #fff; }

        /* Service Page Layout */
        .service-page { display: none; animation: fadeIn 0.3s ease; }
        .service-page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn { background: #333; border: none; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { background: #ff0000; }

        .form-container { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; margin-top: 20px; }
        .form-input, .form-select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .generate-btn { width: 100%; background: #ff0000; border: none; padding: 15px; color: #fff; font-weight: 600; border-radius: 8px; cursor: pointer; text-transform: uppercase; }

        .result-box { background: #1a1a1a; border: 1px solid #ff0000; border-radius: 12px; padding: 25px; margin-top: 20px; display: none; text-align: center; }
        .result-text { word-break: break-all; margin-bottom: 15px; font-family: monospace; color: #ff0000; }

        /* Stars */
        .star { position: absolute; color: #ff0000; pointer-events: none; z-index: 1; font-size: 12px; animation: fall linear forwards; }
        @keyframes fall { from { transform: translateY(-50px); opacity: 1; } to { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>
    <a href="https://discord.gg" class="discord-btn-top" target="_blank">OUR DISCORD</a>

    <div class="container">
        <!-- Home Page -->
        <div id="homePage">
            <div class="header">
                <h1>ZeroBeaming</h1>
                <p style="color: #888; letter-spacing: 2px;">PROFESSIONAL URL MANAGEMENT</p>
            </div>
            <div class="services-grid">
                <div class="service-card" onclick="openService()">
                    <h3>Hyperlink</h3>
                    <p style="color:#666; margin-top:5px;">Shorten Roblox Links</p>
                </div>
            </div>
        </div>

        <!-- Hyperlink Page -->
        <div id="servicePage" class="service-page">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h2 style="text-align: center; text-transform: uppercase; letter-spacing: 2px;">Hyperlink</h2>

            <div class="form-container">
                <label style="display:block; margin-bottom:5px; font-size:0.8rem; color:#ff0000;">LINK TYPE</label>
                <select class="form-select" id="optionSelect">
                    <option value="private-server">Private Server</option>
                    <option value="profile">Profile</option>
                    <option value="any">Any Link</option>
                </select>
                <label style="display:block; margin-bottom:5px; font-size:0.8rem; color:#ff0000;">TARGET URL</label>
                <input type="url" class="form-input" id="urlInput" placeholder="https://roblox.com...">
                <button class="generate-btn" onclick="generateLink()">Generate</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-text" id="resultText"></div>
                <button class="generate-btn" onclick="copyResult()">Copy Result</button>
            </div>
        </div>
    </div>

    <script>
        function openService() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('servicePage').classList.add('active');
        }

        function goBack() {
            document.getElementById('servicePage').classList.remove('active');
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
        }

        async function generateLink() {
            const urlInput = document.getElementById('urlInput');
            const option = document.getElementById('optionSelect').value;
            const originalUrl = urlInput.value.trim();
            if (!originalUrl) { alert('Please enter a URL!'); return; }

            const resultText = document.getElementById('resultText');
            resultText.innerHTML = '<span>Processing...</span>';
            document.getElementById('resultBox').style.display = 'block';

            const cbName = 'beam_cb_' + Date.now();
            window[cbName] = function(data) {
                if (data.shorturl) {
                    let displayUrl = originalUrl;
                    const userId = originalUrl.match(/users\/(\d+)/)?.[1] || 'ID';
                    const serverCode = originalUrl.match(/code=([a-f0-9]+)/i)?.[1] || 'abc';

                    if(option === 'profile') displayUrl = `https__:__//://roblox.com{userId}/profile`;
                    else if(option === 'private-server') displayUrl = `https_:_//://roblox.com{serverCode}&type=Server`;
                    
                    resultText.textContent = `[${displayUrl}](${data.shorturl})`;
                } else {
                    resultText.textContent = "Error: " + (data.errormessage || "Invalid Link");
                }
                delete window[cbName];
                const s = document.getElementById('temp_script');
                if(s) s.remove();
            };

            const script = document.createElement('script');
            script.id = 'temp_script';
            script.src = `https://is.gd{cbName}&url=${encodeURIComponent(originalUrl)}`;
            document.body.appendChild(script);
        }

        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('resultText').innerText);
            alert("Copied!");
        }

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }
        setInterval(createStar, 400);
    </script>
</body>
</html>
