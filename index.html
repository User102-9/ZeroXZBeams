<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Header */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            display: none; /* Hidden by default */
        }

        .discord-btn {
            background-color: #007BFF;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid white;
        }

        /* Logo Area */
        .logo {
            font-size: 4rem;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 0 0 15px #FFF, 0 0 30px #007BFF;
            margin-top: 10vh;
            text-transform: uppercase;
            z-index: 10;
        }

        /* Main Menu Containers */
        #main-menu, .page-content {
            display: flex;
            gap: 30px;
            margin-top: 50px;
            z-index: 10;
            justify-content: center;
            width: 100%;
        }

        .page-content {
            display: none; /* Hidden until clicked */
            flex-direction: column;
            align-items: center;
        }

        /* Big Bordered Boxes */
        .big-box {
            border: 5px solid white; /* Made borders bigger */
            padding: 40px 60px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            min-width: 200px;
        }

        .big-box:hover {
            box-shadow: 0 0 30px #007BFF;
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        /* Generator Specific Sub-items */
        .sub-item {
            margin: 15px;
            padding: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            width: 60%;
            text-align: center;
        }

        .sub-item a { color: #007BFF; text-decoration: none; font-weight: bold; }

        /* Falling Stars */
        .night { position: absolute; width: 100%; height: 100%; transform: rotateZ(45deg); z-index: 1; }
        .shooting_star { position: absolute; height: 2px; background: linear-gradient(-45deg, #5f91ff, rgba(0,0,255,0)); border-radius: 999px; animation: tail 3000ms infinite, shooting 3000ms infinite; }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }
    </style>
</head>
<body>

    <div class="night">
        <div class="shooting_star" style="top:10%; left:10%"></div>
        <div class="shooting_star" style="top:30%; left:50%"></div>
        <div class="shooting_star" style="top:70%; left:20%"></div>
    </div>

    <header>
        <button class="back-btn" id="backBtn" onclick="goBack()">← BACK</button>
        <a href="https://discord.gg" class="discord-btn" target="_blank">OUR DISCORD</a>
    </header>

    <h1 class="logo" id="pageTitle">BeamZero</h1>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="big-box" onclick="openPage('Tutorials')">Tutorials</div>
        <div class="big-box" onclick="openPage('Generators')">Generators</div>
        <div class="big-box" onclick="openPage('Tools')">Tools</div>
    </div>

    <!-- GENERATORS PAGE -->
    <div id="generators-page" class="page-content">
        <div class="sub-item">
            <h3>Beam Link</h3>
            <p>Generate your beam link for questions here.</p>
        </div>
        <div class="sub-item">
            <h3>Answer Finder</h3>
            <p>Find answers for your questions instantly.</p>
        </div>
        <div class="sub-item">
            <h3>Link Hider</h3>
            <p><a href="#">Hyperlink: Click here to hide your link</a></p>
        </div>
    </div>

    <!-- OTHER PAGES (Placeholders) -->
    <div id="other-page" class="page-content">
        <h2>Content coming soon...</h2>
    </div>

    <script>
        function openPage(name) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('pageTitle').innerText = name;

            if(name === 'Generators') {
                document.getElementById('generators-page').style.display = 'flex';
            } else {
                document.getElementById('other-page').style.display = 'flex';
            }
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('generators-page').style.display = 'none';
            document.getElementById('other-page').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('pageTitle').innerText = 'BeamZero';
        }
    </script>
</body>
</html>
