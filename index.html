
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ꜱᴇɴᴛʀʏ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #4f4524;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #fad850, #f0a82b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .header .subtitle {
            font-size: 1.2rem;
            color: #888888;
            font-weight: 300;
        }

        /* Navigation */

        .nav-section {
            margin-bottom: 50px;
        }

        .nav-section h2 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .service-card {
            background: #6b5b19;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card:hover {
            background: #222;
            border-color: #555;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .service-card.recommended {
            background: #6b5b19;
            border-color: #666;
        }

        .service-card.recommended::before {
            content: 'Recommended';
            position: absolute;
            top: 8px;
            right: 12px;
            background: #666;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .service-card h3 {
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .service-card p {
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Service Page */

        .service-page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .service-page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .service-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .back-btn {
            background: #333;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #444;
            transform: translateX(-3px);
        }

        .service-title {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            background: #6b5b19;
            border: 1px solid #333;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .tab.active {
            background: #333;
            color: #ffffff;
        }

        .tab:hover:not(.active) {
            background: #222;
            color: #ffffff;
        }

        /* Forms */

        .form-container {
            background: #6b5b19;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0d0d0d;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #666;
            background: #111;
        }

        .form-input::placeholder {
            color: #666;
        }

        .form-help {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(45deg, #333, #555);
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .generate-btn:hover {
            background: linear-gradient(45deg, #444, #666);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Results */

        .result-box {
            background: #6b5b19;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }

        .result-box.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .result-text {
            word-break: break-all;
            margin-bottom: 15px;
            padding: 12px;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 6px;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .loading {
            color: #888;
            font-style: italic;
        }

        /* Discord Button */

        .discord-section {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        .discord-btn {
            background: linear-gradient(45deg, #e69737, #e6cc37);
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .discord-btn:hover {
            background: linear-gradient(45deg, #6b5b19);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Notification */

        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #555;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .notification.show {
            opacity: 1;
        }

        /* Responsive Design */

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header h1 {
                font-size: 2.5rem;
            }
            .services-grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                flex-direction: column;
            }
            .service-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .form-container {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            .service-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Home Page -->
        <div id="homePage">
            <div class="header">
                <h1>ꜱᴇɴᴛʀʏ</h1>
                <p class="subtitle">Professional URL Shortening Services</p>
            </div>

            <div class="nav-section">
                <h2>Select URL Shortener</h2>
                <div class="services-grid">
                    <div class="service-card recommended" onclick="openService('is.gd')">
                        <h3>is.gd</h3>
                        <p>Fast and reliable shortening service</p>
                    </div>
                </div>
            </div>

            <div class="discord-section">
                <a class="discord-btn" href="https://discord.gg/V5zaPyCpKw" target="_blank" rel="noopener noreferrer">Join Discord Community</a>
            </div>
        </div>

        <!-- Service Page -->
        <div id="servicePage" class="service-page">
            <div class="service-header">
                <button class="back-btn" onclick="goBack()">
                    ← Back to Services
                </button>
                <h2 class="service-title" id="serviceTitle">is.gd</h2>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('shorten')">Shorten URL</button>
                <button class="tab" onclick="switchTab('unshorten')">Unshorten URL</button>
            </div>

            <!-- Shorten URL Tab -->
            <div id="shortenTab">
                <div class="form-container">
                    <div class="form-group">
                        <label class="form-label">Select Link Type</label>
                        <select class="form-select" id="optionSelect">
                            <option value="private-server">Private Server</option>
                            <option value="profile">Profile</option>
                            <option value="group">Group</option>
                            <option value="any">Any Link</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Enter Your Link</label>
                        <input type="url" class="form-input" id="urlInput" placeholder="https://www.roblox.com.py/users/123/profile">
                        <div class="form-help">Paste your full URL here to be shortened</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Custom Slug (Optional)</label>
                        <input type="text" class="form-input" id="customSlug" placeholder="your-custom-slug">
                        <div class="form-help">Leave empty for random slug generation</div>
                    </div>

                    <button class="generate-btn" onclick="generateLink()">Generate Shortened Link</button>
                </div>
            </div>

            <!-- Unshorten URL Tab -->
            <div id="unshortenTab" style="display: none;">
                <div class="form-container">
                    <div class="form-group">
                        <label class="form-label">Enter Shortened URL</label>
                        <input type="url" class="form-input" id="shortenedUrlInput" placeholder="https://is.gd/abc123">
                        <div class="form-help">Paste the shortened URL to reveal the original</div>
                    </div>

                    <button class="generate-btn" onclick="unshortenLink()">Reveal Original URL</button>
                </div>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-label">Generated Result:</div>
                <div class="result-text" id="resultText"></div>
                <button class="generate-btn" onclick="copyResult()">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <script>
        // Navigation
        function openService(service) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('servicePage').classList.add('active');
            document.getElementById('serviceTitle').textContent = service;
            document.getElementById('resultBox').classList.remove('show');
        }

        function goBack() {
            document.getElementById('servicePage').classList.remove('active');
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('resultBox').classList.remove('show');
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'shorten') {
                tabs[0].classList.add('active');
                document.getElementById('shortenTab').style.display = 'block';
                document.getElementById('unshortenTab').style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('shortenTab').style.display = 'none';
                document.getElementById('unshortenTab').style.display = 'block';
            }
            document.getElementById('resultBox').classList.remove('show');
        }

        async function generateLink() {
            const urlInput = document.getElementById('urlInput');
            const option = document.getElementById('optionSelect').value;
            const customSlug = document.getElementById('customSlug').value.trim();
            const originalUrl = urlInput.value.trim();

            if (!originalUrl) {
                alert('Please enter a URL!');
                urlInput.focus();
                return;
            }

            // Show loading
            const resultText = document.getElementById('resultText');
            resultText.innerHTML = '<span class="loading">Generating secure link...</span>';
            document.getElementById('resultBox').classList.add('show');

            try {
                const serviceName = document.getElementById('serviceTitle').textContent;
                let shortenedUrl;

                // 1. Actually shorten the REAL robiox.com.tg URL
                if (serviceName === 'is.gd' || serviceName === 'v.gd') {
                    const apiUrl = `https://${serviceName}/create.php?format=json&url=${encodeURIComponent(originalUrl)}${customSlug ? `&shorturl=${customSlug}` : ''}`;

                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    if (!response.ok || !data.shorturl) {
                        throw new Error(data.errormessage || "Shortening service unavailable");
                    }
                    shortenedUrl = data.shorturl;
                } else {
                    const slug = customSlug || Math.random().toString(36).substr(2, 6);
                    shortenedUrl = `https://${serviceName.toLowerCase()}/${slug}`;
                }

                // 2. Create the display text (formatted as roblox.com)
                let displayUrl;
                const userId = originalUrl.match(/users\/(\d+)/)?.[1] || 'ID';
                const groupId = originalUrl.match(/(communities|groups)\/(\d+)/)?.[2] || 'ID';
                const serverCode = originalUrl.match(/code=([a-f0-9]+)/i)?.[1] || 'abc123';

                switch (option) {
                    case 'profile':
                        displayUrl = `https__:__//www.roblox.com/users/${userId}/profile`;
                        break;
                    case 'group':
                        displayUrl = `https__:__//www.roblox.com/groups/${groupId}`;
                        break;
                    case 'private-server':
                        displayUrl = `https_:_//www.roblox.com/share?code=${serverCode}&type=Server`;
                        break;
                    default:
                        displayUrl = originalUrl.replace('robiox.com.tg', 'roblox.com');
                }

                // 3. Combine into final output
                const result = `[${displayUrl}](${shortenedUrl})`;
                resultText.textContent = result;
            } catch (error) {
                console.error("Shortening error:", error);
                resultText.textContent = `Error: ${error.message || 'Failed to create link. Try again.'}`;
            }
        }

        async function unshortenLink() {
            const url = document.getElementById('shortenedUrlInput').value.trim();

            if (!url) {
                alert('Please enter a shortened URL!');
                return;
            }

            document.getElementById('resultText').innerHTML = '<span class="loading">Revealing original URL...</span>';
            document.getElementById('resultBox').classList.add('show');

            try {
                if (url.includes('is.gd/') || url.includes('v.gd/')) {
                    const service = url.includes('is.gd/') ? 'is.gd' : 'v.gd';
                    const response = await fetch(`https://${service}/forward.php?format=simple&shorturl=${encodeURIComponent(url)}`);
                    const originalUrl = await response.text();

                    if (originalUrl.startsWith('http')) {
                        document.getElementById('resultText').textContent = originalUrl;
                        return;
                    }
                    throw new Error(originalUrl);
                }

                document.getElementById('resultText').textContent = 'Unshortening complete (demo)';
            } catch (error) {
                document.getElementById('resultText').textContent = `Error: ${error.message || 'Failed to unshorten URL'}`;
            }
        }

        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showNotification("Copied to clipboard!");
            });
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.classList.add('show');
                setTimeout(() => {
                    notif.classList.remove('show');
                    setTimeout(() => notif.remove(), 300);
                }, 2000);
            }, 10);
        }
    </script>
</body>

</html>
