<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroBeams</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2; }

        /* White Discord Button Top Right */
        .discord-btn-top {
            position: absolute; top: 20px; right: 20px;
            background: #ffffff; color: #000000;
            text-decoration: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 900; font-size: 0.8rem;
            z-index: 1000; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        .discord-btn-top:hover { background: #ff0000; color: #ffffff; }

        .header h1 {
            font-size: 3.5rem; font-weight: 900; margin-bottom: 15px;
            background: linear-gradient(45deg, #ff0000, #800000);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; text-shadow: 0 2px 10px rgba(255, 0, 0, 0.3);
        }

        .star { position: absolute; color: #ff0000; pointer-events: none; z-index: 1; font-size: 12px; animation: fall linear forwards; }
        @keyframes fall { from { transform: translateY(-50px); opacity: 1; } to { transform: translateY(110vh); opacity: 0; } }

        .header { text-align: center; padding: 40px 0; border-bottom: 1px solid #333; margin-bottom: 40px; }
        .header .subtitle { font-size: 1.2rem; color: #888888; font-weight: 300; }
        .nav-section { margin-bottom: 50px; }
        .nav-section h2 { font-size: 1.8rem; color: #ffffff; margin-bottom: 20px; text-align: center; font-weight: 600; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .service-card { background: #1a1a1a; border: 2px solid #333; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .service-card:hover { background: #222; border-color: #ff0000; transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .service-card h3 { font-size: 1.2rem; color: #ffffff; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        .service-card p { color: #aaa; font-size: 0.9rem; }
        .service-page { display: none; animation: fadeIn 0.3s ease; }
        .service-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .service-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .back-btn { background: #333; border: none; color: #ffffff; cursor: pointer; font-size: 1rem; padding: 10px 20px; border-radius: 8px; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
        .service-title { font-size: 2.2rem; color: #ffffff; font-weight: 700; }
        .tabs { display: flex; margin-bottom: 30px; border-radius: 8px; overflow: hidden; background: #1a1a1a; border: 1px solid #333; }
        .tab { flex: 1; padding: 15px 20px; background: transparent; border: none; color: #aaa; cursor: pointer; transition: all 0.3s ease; font-size: 1rem; }
        .tab.active { background: #ff0000; color: #ffffff; }
        .form-container { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .form-group { margin-bottom: 25px; }
        .form-label { display: block; margin-bottom: 8px; color: #ffffff; font-weight: 500; font-size: 0.95rem; }
        .form-input, .form-select { width: 100%; padding: 12px 16px; border: 2px solid #333; border-radius: 8px; background: #0d0d0d; color: #ffffff; font-size: 1rem; transition: all 0.3s ease; }
        .generate-btn { width: 100%; background: #ff0000; border: none; border-radius: 8px; padding: 15px; color: #ffffff; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .generate-btn:hover { background: #cc0000; transform: translateY(-2px); }
        .result-box { background: #1a1a1a; border: 1px solid #ff0000; border-radius: 12px; padding: 25px; margin-top: 20px; display: none; }
        .result-box.show { display: block; }
        .result-text { word-break: break-all; margin-bottom: 15px; padding: 12px; background: #0d0d0d; border: 1px solid #333; border-radius: 6px; color: #ffffff; font-family: 'Courier New', monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="https://discord.gg" class="discord-btn-top" target="_blank">OUR DISCORD</a>

    <div class="container">
        <div id="homePage">
            <div class="header">
                <h1>ZeroBeams</h1>
                <p class="subtitle">Professional URL Shortening Services</p>
            </div>

            <div class="nav-section">
                <h2>Dashboard</h2>
                <div class="services-grid">
                    <div class="service-card" onclick="alert('Main Dashboard coming soon!')">
                        <h3>Main Dashboard</h3>
                        <p>Overview of your tools</p>
                    </div>
                    <div class="service-card" onclick="openService('is.gd')">
                        <h3>Hyperlink</h3>
                        <p>Fast and reliable shortening service</p>
                    </div>
                    <div class="service-card" onclick="alert('Questions feed coming soon!')">
                        <h3>Questions</h3>
                        <p>Community and support</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="servicePage" class="service-page">
            <div class="service-header">
                <button class="back-btn" onclick="goBack()">← Back</button>
                <h2 class="service-title" id="serviceTitle">is.gd</h2>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('shorten')">Shorten URL</button>
                <button class="tab" onclick="switchTab('unshorten')">Unshorten URL</button>
            </div>
            <div id="shortenTab">
                <div class="form-container">
                    <div class="form-group">
                        <label class="form-label">Select Link Type</label>
                        <select class="form-select" id="optionSelect">
                            <option value="private-server">Private Server</option>
                            <option value="profile">Profile</option>
                            <option value="group">Group</option>
                            <option value="any">Any Link</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Enter Your Link</label>
                        <input type="url" class="form-input" id="urlInput" placeholder="https://roblox.com">
                    </div>
                    <button class="generate-btn" onclick="generateLink()">Generate Shortened Link</button>
                </div>
            </div>
            <div class="result-box" id="resultBox">
                <div class="result-label">Generated Result:</div>
                <div class="result-text" id="resultText"></div>
                <button class="generate-btn" onclick="copyResult()">Copy to Clipboard</button>
            </div>
        </div>
    </div>
    <script>
        function openService(service) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('servicePage').classList.add('active');
            document.getElementById('serviceTitle').textContent = service;
            document.getElementById('resultBox').classList.remove('show');
        }
        function goBack() {
            document.getElementById('servicePage').classList.remove('active');
            document.getElementById('homePage').style.display = 'block';
        }
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'shorten') {
                tabs[0].classList.add('active');
                document.getElementById('shortenTab').style.display = 'block';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('shortenTab').style.display = 'none';
            }
        }

        async function generateLink() {
            const urlInput = document.getElementById('urlInput');
            const option = document.getElementById('optionSelect').value;
            const originalUrl = urlInput.value.trim();
            if (!originalUrl) { alert('Enter a URL!'); return; }

            const resultText = document.getElementById('resultText');
            resultText.innerHTML = '<span style="color:#888">Processing...</span>';
            document.getElementById('resultBox').classList.add('show');

            try {
                const cbName = 'beam_cb_' + Date.now();
                window[cbName] = function(data) {
                    if (data.shorturl) {
                        let displayUrl = originalUrl;
                        if(option === 'profile') displayUrl = "https://roblox.com";
                        if(option === 'private-server') displayUrl = "https://roblox.com";
                        resultText.textContent = `[${displayUrl}](${data.shorturl})`;
                    } else {
                        resultText.textContent = "Error: " + (data.errormessage || "Invalid URL");
                    }
                    delete window[cbName];
                    document.getElementById('temp_script').remove();
                };
                const script = document.createElement('script');
                script.id = 'temp_script';
                script.src = `https://is.gd{cbName}&url=${encodeURIComponent(originalUrl)}`;
                document.body.appendChild(script);
            } catch (e) { resultText.textContent = "Connection Error."; }
        }

        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('resultText').innerText);
            alert("Copied!");
        }

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }
        setInterval(createStar, 400);
    </script>
</body>
</html>
