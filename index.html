<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: 3px solid white;
            color: white;
            padding: 10px 25px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            display: none;
            text-transform: uppercase;
        }

        .discord-btn {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid white;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 0 0 15px #FFF, 0 0 30px #007BFF;
            margin-top: 10vh;
            text-transform: uppercase;
            z-index: 10;
        }

        #main-menu, #empty-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            margin-top: 50px;
            z-index: 10;
            width: 100%;
        }

        .button-row {
            display: flex;
            gap: 30px;
        }

        #empty-page { display: none; }

        .big-box {
            border: 5px solid white;
            padding: 30px 40px;
            border-radius: 15px;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.4rem;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .big-box:hover {
            box-shadow: 0 0 30px #007BFF;
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        /* Expanded Disclaimer */
        .disclaimer {
            max-width: 900px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.5;
            color: #FFFFFF;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .disclaimer span {
            color: #007BFF;
            text-decoration: underline;
        }

        .risk-warn {
            color: #ff4d4d; /* Red for the risk warning */
            display: block;
            margin-top: 15px;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        /* Stars Background */
        .night { position: absolute; width: 100%; height: 100%; transform: rotateZ(45deg); z-index: 1; }
        .shooting_star { position: absolute; height: 2px; background: linear-gradient(-45deg, #5f91ff, rgba(0,0,255,0)); animation: tail 3000ms infinite, shooting 3000ms infinite; }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }
    </style>
</head>
<body>

    <div class="night">
        <div class="shooting_star" style="top:10%; left:20%"></div>
        <div class="shooting_star" style="top:40%; left:60%"></div>
        <div class="shooting_star" style="top:70%; left:30%"></div>
    </div>

    <header>
        <button class="back-btn" id="backBtn" onclick="goBack()">← BACK</button>
        <a href="https://discord.gg" class="discord-btn" target="_blank">OUR DISCORD</a>
    </header>

    <h1 class="logo" id="pageTitle">BeamZero</h1>

    <div id="main-menu">
        <div class="button-row">
            <div class="big-box" onclick="openPage('Tutorials')">Tutorials</div>
            <div class="big-box" onclick="openPage('Generators')">Generators</div>
            <div class="big-box" onclick="openPage('Tools')">Tools</div>
        </div>
        
        <div class="disclaimer">
            Join our discord <span>Zerobeams</span>. Follow the <span>rules</span> and listen to <span>staff</span>. 
            We do not encourage beaming or illegal activities. Everything here is strictly for <span>educational purposes</span>.
            <b class="risk-warn">YOU ARE USING THIS AT YOUR OWN SAFETY RISK.</b>
        </div>
    </div>

    <div id="empty-page"></div>

    <script>
        function openPage(name) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('pageTitle').innerText = name;
            document.getElementById('empty-page').style.display = 'flex';
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('empty-page').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('pageTitle').innerText = 'BeamZero';
        }
    </script>
</body>
</html>
