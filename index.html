<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>zeroBypass</title>
  <meta name="description" content="Paste text and send instantly via zeroBypass."/>
  <!-- Production Tailwind CDN for rendering clean layout structures -->
  <script src="tailwindcss.com"></script>
</head>
<body class="bg-[#FFFFFF] text-[#0F172A] min-h-screen flex flex-col items-center justify-center px-6">

  <main class="w-full max-w-2xl flex flex-col items-center">
    <!-- Header Block Component -->
    <div class="mb-8 text-center">
      <h1 class="text-[40px] font-bold tracking-tight text-[#0F172A]">zeroBypass</h1>
      <!-- Updated subtitle string per requested layout rules -->
      <p class="mt-2 text-sm text-[#94A3B8] font-normal">easy fast</p>
    </div>

    <!-- Main Workspace Control Container -->
    <div class="w-full relative">
      <!-- Input panel box - placeholder removed entirely -->
      <textarea id="paste-box" class="w-full h-64 resize-none rounded-xl border border-[#E2E8F0] bg-[#FFFFFF] text-[#0F172A] p-5 outline-none focus:border-[#CBD5E1] transition-all duration-150 shadow-sm"></textarea>
      
      <div class="mt-4 flex items-center justify-between gap-4 w-full">
        <!-- Live Transmit Log Output Interface -->
        <div id="status" class="text-xs min-h-5 font-medium transition-all duration-150"></div>
        
        <!-- Muted Slate Interaction Submission Trigger Button -->
        <button id="send-btn" disabled class="rounded-lg bg-[#94A3B8] px-5 py-2 text-xs font-semibold text-white transition-all duration-150 disabled:opacity-50 cursor-pointer disabled:cursor-not-allowed hover:bg-[#64748B]">
          Send
        </button>
      </div>
    </div>
  </main>

  <script>
    const textarea = document.getElementById('paste-box');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    // Configured active webhook destination connection node
    const DISCORD_WEBHOOK_URL = "discord.com";

    // Dynamic field tracking input trigger pipeline 
    textarea.addEventListener('input', () => {
      sendBtn.disabled = textarea.value.trim() === "";
    });

    // Content transmission dispatcher event
    sendBtn.addEventListener('click', async () => {
      const payloadText = textarea.value.trim();
      if (!payloadText) return;

      // Lock interactive objects from simultaneous requests
      sendBtn.disabled = true;
      status.textContent = "Processing packet delivery...";
      status.className = "text-xs min-h-5 font-medium text-amber-500";

      try {
        const response = await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: `**[zeroBypass Incoming Packet]**\n\`\`\`text\n${payloadText}\n\`\`\``
          })
        });

        if (response.ok) {
          status.textContent = "Packet sent successfully.";
          status.className = "text-xs min-h-5 font-medium text-emerald-600";
          textarea.value = "";
        } else {
          throw new Error(`Server target error: ${response.status}`);
        }
      } catch (err) {
        status.textContent = "Transmission failure occurred.";
        status.className = "text-xs min-h-5 font-medium text-red-500";
        sendBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
