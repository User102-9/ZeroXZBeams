<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>zeroBypass</title>
  <meta name="description" content="Paste text and send instantly via zeroBypass."/>
  
  <style>
    /* Direct Standard Reset Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Centered Screen Layout Wrapper */
    .container {
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Typography Hierarchy Elements */
    .header-block {
      text-align: center;
      margin-bottom: 24px;
      user-select: none;
      width: 100%;
    }

    .header-block h1 {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: #0f172a;
      line-height: 1;
    }

    .header-block p {
      margin-top: 14px;
      font-size: 13px;
      color: #94a3b8;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Main Workspace Container Control */
    .workspace-box {
      width: 100%;
      position: relative;
      background-color: #ffffff;
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px 0 rgba(0, 0, 0, 0.02);
      transition: border-color 0.15s ease;
    }

    .workspace-box:focus-within {
      border-color: #cbd5e1;
    }

    /* Input panel box text content */
    .paste-area {
      width: 100%;
      height: 380px;
      resize: none;
      background: transparent;
      border: none;
      outline: none;
      color: #0f172a;
      font-size: 16px;
      line-height: 1.6;
      padding-bottom: 56px;
    }

    /* Floating Action Controls Interface Row */
    .action-row {
      position: absolute;
      bottom: 20px;
      left: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }

    /* Process Notification Logger Displays */
    .status-msg {
      font-size: 12px;
      font-weight: 500;
      pointer-events: auto;
      transition: all 0.15s ease;
    }

    .status-sending { color: #f59e0b; }
    .status-success { color: #059669; }
    .status-error { color: #dc2626; }

    /* Standard Interactive Button Object Styles */
    .send-button {
      border: none;
      outline: none;
      border-radius: 8px;
      background-color: #94a3b8;
      color: #ffffff;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: background-color 0.15s ease, opacity 0.15s ease;
    }

    .send-button:hover:not(:disabled) {
      background-color: #64748b;
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <main class="container">
    
    <!-- Title Stack Above Content Box -->
    <div class="header-block">
      <h1>zeroBypass</h1>
      <p>easy fast</p>
    </div>

    <!-- Pinned Center Layout Form Body Frame -->
    <div class="workspace-box">
      
      <textarea id="paste-box" class="paste-area" autocomplete="off" spellcheck="false"></textarea>
      
      <div class="action-row">
        <!-- Delivery Status Node Output Block -->
        <div id="status" class="status-msg"></div>
        
        <!-- Interactive Submit Object Component -->
        <button id="send-btn" class="send-button" disabled>Send</button>
      </div>
      
    </div>
  </main>

  <script>
    const textarea = document.getElementById('paste-box');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    // Your active background Discord delivery webhook endpoint
    const DISCORD_WEBHOOK_URL = "discord.com";

    // Track user string activity state values
    textarea.addEventListener('input', () => {
      sendBtn.disabled = textarea.value.trim() === "";
    });

    // Content event posting process execution framework
    sendBtn.addEventListener('click', async () => {
      const payloadText = textarea.value.trim();
      if (!payloadText) return;

      // Restrict interactive paths to prevent simultaneous submissions
      sendBtn.disabled = true;
      status.textContent = "Sending...";
      status.className = "status-msg status-sending";

      try {
        const response = await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: `**[zeroBypass Incoming Packet]**\n\`\`\`text\n${payloadText}\n\`\`\``
          })
        });

        if (response.ok) {
          status.textContent = "Sent successfully!";
          status.className = "status-msg status-success";
          textarea.value = "";
          setTimeout(() => { status.textContent = ""; }, 3500);
        } else {
          throw new Error(`Server status flag code: ${response.status}`);
        }
      } catch (err) {
        status.textContent = "Error sending.";
        status.className = "status-msg status-error";
        sendBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
